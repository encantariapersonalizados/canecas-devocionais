<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Devocionais Diários</title>
  <meta
    name="description"
    content="Uma palavra bíblica, uma reflexão e uma oração para o seu dia."
  />

  <!-- Google Fonts (com fallback no CSS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome (ícones) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    referrerpolicy="no-referrer"
  />

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <!-- Topo / Identidade -->
    <header>
      <img
        src="assets/logo-encantaria.png"
        alt="Encantaria Personalizados"
        class="logo-encantaria"
      />

      <h1>Devocionais Diários</h1>
      <p class="subtitulo">
        Uma palavra bíblica, uma reflexão e uma oração para o seu dia.
      </p>
    </header>

    <!-- Cartão principal do devocional -->
    <section id="devocional-card" class="card" aria-live="polite">
      <header class="card-header">
        <p id="data-atual" class="data"></p>
        <p id="titulo-devocional" class="titulo-devocional"></p>
      </header>

      <section class="bloco-versiculo">
        <p id="referencia" class="referencia"></p>
        <blockquote id="versiculo" class="versiculo"></blockquote>
      </section>

      <hr class="separador" />

      <section class="bloco-reflexao">
        <h2 class="secao-titulo">Reflexão</h2>
        <p id="texto-reflexao" class="texto-devocional texto-reflexao">
          <!-- preenchido via JavaScript -->
        </p>
      </section>

      <section class="bloco-oracao">
        <h2 class="secao-titulo">Oração</h2>
        <p id="texto-oracao" class="texto-devocional texto-oracao">
          <!-- preenchido via JavaScript -->
        </p>
      </section>
    </section>

<section class="compartilhar">
  <h3 class="compartilhar-titulo">Compartilhar esta mensagem</h3>
  <div class="botoes-compartilhar">
    <button id="share-whatsapp" class="btn-share whatsapp" type="button">
      <i class="fa-brands fa-whatsapp"></i>
      <span>WhatsApp</span>
    </button>
    <button id="share-facebook" class="btn-share facebook" type="button">
      <i class="fa-brands fa-facebook-f"></i>
      <span>Facebook</span>
    </button>
    <button id="share-instagram" class="btn-share instagram" type="button">
      <i class="fa-brands fa-instagram"></i>
      <span>Instagram</span>
    </button>
  </div>
</section>

    

<footer>
  <p>
    © <span id="ano-atual"></span> Devocionais Diários · por Encantaria Personalizados.
  </p>

  <p class="subtitulo">
    Escaneado a partir de um QR Code especial. Compartilhe esta mensagem com alguém hoje.
  </p>

  <p class="subtitulo" id="contador-devocionais"></p>



  <p class="instagram-link">
    <a
      href="https://www.instagram.com/encantariapersonalizados/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Abrir Instagram da Encantaria Personalizados"
    >
      <i class="fa-brands fa-instagram"></i>
      <span>@encantariapersonalizados</span>
    </a>
  </p>
</footer>

  </main>


  <!-- Script com devocionais e lógica -->
  <script src="devocionais.js"></script>
</body>
</html>
